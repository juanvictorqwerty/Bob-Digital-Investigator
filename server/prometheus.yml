# Prometheus configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'django-backend'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets:
          # When running both Django and Prometheus in Docker Compose:
          - 'server:8000'
          # For local development (Django on host, Prometheus in Docker):
          - 'host.docker.internal:8000'
        labels:
          service: 'backend'
          app: 'bob-digital-investigator'

  - job_name: 'nextjs-frontend'
    scrape_interval: 10s
    metrics_path: '/api/metrics'
    static_configs:
      - targets:
          # For local development (Next.js on host, Prometheus in Docker):
          - 'host.docker.internal:3000'
        labels:
          service: 'frontend'
          app: 'bob-digital-investigator'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']