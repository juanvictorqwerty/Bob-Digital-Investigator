name: CI - Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  client-tests:
    name: Client Tests (Next.js + Bun)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.6

      - name: Install client dependencies
        working-directory: ./client
        run: bun install --frozen-lockfile

      - name: Run client tests
        working-directory: ./client
        run: bun test --reporter=github-actions

  server-tests:
    name: Server Tests (Django + PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: bob_test
          POSTGRES_USER: bob_test
          POSTGRES_PASSWORD: bob_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U bob_test -d bob_test
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.3"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc libpq-dev

      - name: Install Python dependencies
        working-directory: ./server
        run: pip install -r requirements.txt

      - name: Create test .env
        working-directory: ./server
        run: |
          cat > .env << 'EOF'
          DB_NAME=bob_test
          DB_USER=bob_test
          DB_PASSWORD=bob_test
          DB_HOST=localhost
          DB_PORT=5432
          REDIS_HOST=localhost
          REDIS_PORT=6379
          DJANGO_SUPERUSER_EMAIL=test@example.com
          DJANGO_SUPERUSER_PASSWORD=testpass123
          FRONTEND_URL=http://localhost:3000
          # Optional keys — set to empty for tests
          CLOUDINARY_CLOUD_NAME=
          CLOUDINARY_API_KEY=
          CLOUDINARY_API_SECRET=
          SERPAPI_KEY=
          OPENROUTER_API_KEY=
          RAPIDAPI_KEY=
          REVERSE_IMAGE=
          SEARXNG_BASE_URL=http://localhost:8888
          GF_SECURITY_ADMIN_USER=admin
          GF_SECURITY_ADMIN_PASSWORD=admin
          EOF

      - name: Run migrations
        working-directory: ./server
        run: python manage.py migrate --noinput

      - name: Run Django tests
        working-directory: ./server
        run: python manage.py test --noinput --verbosity=2