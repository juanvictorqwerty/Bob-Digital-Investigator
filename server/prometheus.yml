# Prometheus configuration for Bob Digital Investigator
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'django-backend'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'django:8000'
        labels:
          service: 'backend'
          app: 'bob-digital-investigator'

  - job_name: 'nextjs-frontend'
    scrape_interval: 10s
    metrics_path: '/api/metrics'
    static_configs:
      - targets:
          - 'client:3000'
        labels:
          service: 'frontend'
          app: 'bob-digital-investigator'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']